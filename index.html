<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의료폐기물 용기 신청</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f5f5f4; }
    header { background:#2c7be4; color:white; padding:15px; text-align:center; }
    .container { padding:15px; }
    .card { background:white; border-radius:12px; padding:15px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    label { display:block; margin-top:10px; font-weight:bold; }
    input, select { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ccc; }
    button { width:100%; padding:12px; margin-top:15px; border:none; border-radius:10px; background:#2c7be5; color:white; font-size:16px; }
    .menu { display:flex; justify-content:space-around; margin-bottom:15px; }
    .menu-item { text-align:center; }
    .menu-item img { width:60px; height:60px; }
  </style>
</head>
<body>

<header>
  <h2>의료폐기물 용기 신청</h2>
</header>

<div class="container">

  <!-- 메뉴 영역 -->
  <div class="menu">
    <div class="menu-item">
      <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
      <div>신청</div>
    </div>
    <div class="menu-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828948.png">
      <div>조회</div>
    </div>
    <div class="menu-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828895.png">
      <div>안내</div>
    </div>
  </div>

  <!-- 신청 폼 -->
  <div class="card">
    <h3>신청 정보</h3>

    <label>발생 부서</label>
    <input type="text" id="dept" placeholder="예: 40병동">

    <label>용기 종류</label>
    <select id="type">
      <option value="손상성">손상성폐기물</option>
      <option value="감염성">격리의료폐기물</option>
      <option value="일반">일반의료폐기물</option>
    </select>

    <label>수량</label>
    <input type="number" id="qty" placeholder="수량 입력">

    <button onclick="submitForm()">신청하기</button>
  </div>

</div>

<script>
function submitForm() {
  const dept = document.getElementById('dept').value;
  const type = document.getElementById('type').value;
  const qty = document.getElementById('qty').value;

  if(!dept || !qty) {
    alert('모든 값을 입력하세요');
    return;
  }

    fetch('https://script.google.com/macros/s/AKfycbz7zjJYAObtQxNG2wQI4Qf_5V_IyJ67IwgpMYtN9izATQM2FJYOmI33ETJFtMEPk00/exec', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dept, type, qty })
  })
.then(res => res.text())
.then(data => {
  alert('신청 완료');
})
  .catch(err => {
    console.error(err);
    alert('오류 발생');
  });
}
</script>

</body>
</html>
